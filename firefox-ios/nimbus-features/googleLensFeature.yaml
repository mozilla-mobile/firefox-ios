# The configuration for the Google Lens feature
features:
  google-lens-feature:
    description: >
      The feature flag to manage the rollout of Google Lens entry points.
    variables:
      enabled:
        description: >
          Enables Google Lens entry points.
        type: Boolean
        default: false
    defaults:
      - channel: beta
        value:
          enabled: false
      - channel: developer
        value:
          enabled: false
