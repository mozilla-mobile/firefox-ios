# The configuration for the needsReloadRefactor technical refactor
features:
  needs-reload-refactor:
    description: >
      This is a technical refactor which cleans up the reloading of the webview
    variables:
      enabled:
        description: >
          Whether or not this refactor is enabled
        type: Boolean
        default: false
    defaults:
      - channel: beta
        value:
          enabled: false
      - channel: developer
        value:
          enabled: true