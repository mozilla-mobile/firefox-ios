# The configuration for the worldCupWidgetFeature feature
features:
  world-cup-widget-feature:
    description: >
      The feature flag to manage the roll out of the world cup widget feature
    variables:
      enabled:
        description: >
          Whether or not this feature is enabled
        type: Boolean
        default: false
      countdown-target-date:
        description: >
          The ISO 8601 date string for the World Cup countdown target
        type: String
        default: "2026-06-11T19:00:00Z"
      milestone-2-enable-date:
        description: >
          The ISO 8601 date string for when milestone 2 (country picker)
          becomes available. Defaults to 10 days before the World Cup
          countdown target date.
        type: String
        default: "2026-06-01T19:00:00Z"
      show-celebration-animation:
        description: >
          Whether or not the celebration animation is shown when a selected team's match is won. 
          For the generic experience the animation is shown after the result of bronze final and final too.
        type: Boolean
        default: true
    defaults:
      - channel: beta
        value:
          enabled: false
          show-celebration-animation: true
      - channel: developer
        value:
          enabled: false
          show-celebration-animation: true
