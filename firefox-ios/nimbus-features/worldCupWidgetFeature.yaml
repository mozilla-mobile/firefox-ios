# The configuration for the worldCupWidgetFeature feature
features:
  world-cup-widget-feature:
    description: >
      The feature flag to manage the roll out of the world cup widget feature
    variables:
      enabled:
        description: >
          Whether or not this feature is enabled
        type: Boolean
        default: false
      countdown-target-date:
        description: >
          The ISO 8601 date string for the World Cup countdown target
        type: String
        default: "2026-06-11T19:00:00Z"
    defaults:
      - channel: beta
        value:
          enabled: true
      - channel: developer
        value:
          enabled: true