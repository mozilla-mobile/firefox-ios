# The configuration for the customReaderModeSchemeFeature feature
features:
  custom-reader-mode-scheme-feature:
    description: >
      Feature description
    variables:
      enabled:
        description: >
          Whether or not this feature is enabled
        type: Boolean
        default: false
    defaults:
      - channel: beta
        value:
          enabled: false
      - channel: developer
        value:
          enabled: true