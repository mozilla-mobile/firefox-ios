# The configuration for the aiKillSwitchFeature feature
features:
  ai-kill-switch-feature:
    description: >
      Configuration feature for AI features
    variables:
      enabled:
        description: >
          Whether or not this feature is enabled
        type: Boolean
        default: false
    defaults:
      - channel: beta
        value:
          enabled: true
      - channel: developer
        value:
          enabled: true
