# The configuration for the bookmarksSearchFeature feature
features:
  bookmarks-search-feature:
    description: >
      Configuration feature for the bookmarks search bar
    variables:
      enabled:
        description: >
          Whether or not this feature is enabled
        type: Boolean
        default: true
    defaults:
      - channel: beta
        value:
          enabled: true
      - channel: developer
        value:
          enabled: true
