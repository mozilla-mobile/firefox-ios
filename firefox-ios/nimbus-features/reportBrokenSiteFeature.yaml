# The configuration for the reportBrokenSiteFeature feature
features:
  report-broken-site-feature:
    description: >
      In-app Report Broken Site (WebCompat) reporter
    variables:
      enabled:
        description: >
          Whether or not this feature is enabled
        type: Boolean
        default: false
    defaults:
      - channel: beta
        value:
          enabled: false
      - channel: developer
        value:
          enabled: true
