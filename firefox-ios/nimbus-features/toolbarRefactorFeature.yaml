# The configuration for the toolbarRefactorFeature feature
features:
  toolbar-refactor-feature:
    description: >
      This feature is for managing the roll out of the Toolbar refactor feature
    variables:
      unified_search:
        description: >
          Enables the unified search feature.
        type: Boolean
        default: false
      layout:
        description: >
          The type of layout of the toolbars.
        type: Option<ToolbarLayoutType>
        default: version1
      tab_tray_button_type:
        description: >
          The style of the tab tray button in the toolbar.
        type: TabTrayButtonType
        default: number

    defaults:
      - channel: beta
        value:
          unified_search: false
          layout: version1
          tab_tray_button_type: number
      - channel: developer
        value:
          unified_search: false
          layout: version1
          tab_tray_button_type: number

enums:
  ToolbarLayoutType:
    description: The type of toolbar layout.
    variants:
      version1:
        description: Shows the add new tab, menu and tabs button in the navigation toolbar. The share button is displayed in the address toolbar.
      version2:
        description: Like version1 but the menu and tabs buttons are inverted.

  TabTrayButtonType:
    description: The style of the tab tray button in the toolbar.
    variants:
      number:
        description: The original tab tray button style that show the icon with the number of tabs.
      screenshot:
        description: The new tab tray button style that shows two images stacked with the previous and next tab.
