# The configuration for the rustKeychain feature
features:
  logins-rust-keychain:
    description: >
      Feature that enables use of the rust keychain logic for storing and retrieving
      logins component encryption key data.
    variables:
      logins-rust-keychain-enabled:
        description: >
          Whether the use of the rust keychain logic is enabled for logins. When enabled,
          the rust keychain is used to store and retrieve encryption key data for logins.
          Otherwise, the pre-existing MZKeychainWrapper logic is used.
        type: Boolean
        default: false
    defaults:
      - channel: beta
        value:
          logins-rust-keychain-enabled: false
      - channel: developer
        value:
          logins-rust-keychain-enabled: true