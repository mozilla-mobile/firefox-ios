# The configuration for the quickAnswersFeature feature
features:
  quick-answers-feature:
    description: >
      The feature flag to manage the roll out of the quick answers feature.
    variables:
      enabled:
        description: >
          Enables the feature.
        type: Boolean
        default: false
    defaults:
      - channel: beta
        value:
          enabled: false
      - channel: developer
        value:
          enabled: false
