# The configuration for the quickAnswersFeature feature
features:
  quick-answers-feature:
    description: >
      The feature flag to manage the roll out of the quick answers feature.
    variables:
      enabled:
        description: >
          Enables the feature.
        type: Boolean
        default: false
      model:
        description: >
          Which provider model backs Quick Answers. A system prompt is injected only for models
          that require it (e.g. exa).
        type: QuickAnswersModel
        default: exa
    defaults:
      - channel: beta
        value:
          enabled: false
          model: exa
      - channel: developer
        value:
          enabled: false
          model: exa

enums:
  QuickAnswersModel:
    description: The provider model that backs the Quick Answers feature.
    variants:
      exa:
        description: The Exa model; a system prompt is injected into the request.
      liner:
        description: The Liner model; no system prompt is injected.
