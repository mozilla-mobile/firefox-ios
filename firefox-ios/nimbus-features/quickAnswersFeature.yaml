# The configuration for the quickAnswersFeature feature
features:
  quick-answers-feature:
    description: >
      The feature flag to manage the roll out of the quick answers feature.
    variables:
      enabled:
        description: >
          Enables the feature.
        type: Boolean
        default: false
      model:
        description: >
          Which provider model backs Quick Answers.
        type: QuickAnswersModel
        default: exa
    defaults:
      - channel: beta
        value:
          enabled: true
          model: exa
      - channel: developer
        value:
          enabled: true
          model: exa

enums:
  QuickAnswersModel:
    description: The provider model that backs the Quick Answers feature.
    variants:
      exa:
        description: The Exa model provider.
      liner:
        description: The Liner model provider.
