# This file defines the metrics that are recorded by the Glean SDK. They are
# automatically converted to Swift code at build time using the `glean_parser`
# PyPI package.

# This file is organized (roughly) alphabetically by metric names
# for easy navigation

---
$schema: moz://mozilla.org/schemas/glean/metrics/2-0-0

$tags:
  - Search

###############################################################################
# Documentation
###############################################################################

# Add your new metrics and/or events here.
# Trending Searches
search.trending_searches:
  suggestions_shown:
    type: event
    description: |
      Triggered when the user types in the address bar and trending search suggestions are shown in the suggestions overlay.
    extra_keys:
      count:
        type: quantity
        description: |
          The number of trending search suggestions displayed.
    data_sensitivity:
      - interaction
    bugs:
      - https://github.com/mozilla-mobile/firefox-ios/issues/29616
    data_reviews:
      - https://github.com/mozilla-mobile/firefox-ios/pull/XXXXX
    notification_emails:
      - fx-ios-data-stewards@mozilla.com
    expires: "2026-01-01"

  suggestion_tapped:
    type: event
    description: |
      Triggered when the user taps a trending search suggestion in the suggestions overlay.
    extra_keys:
      position:
        type: quantity
        description: |
          The position of the clicked trending search suggestion. The first suggestion has index of 1.
    data_sensitivity:
      - interaction
    bugs:
      - https://github.com/mozilla-mobile/firefox-ios/issues/29616
    data_reviews:
      - https://github.com/mozilla-mobile/firefox-ios/pull/XXXXX
    notification_emails:
      - fx-ios-data-stewards@mozilla.com
    expires: "2026-01-01"

# Recent Searches
search.recent_searches:
  suggestions_shown:
    type: event
    description: |
      Triggered when the user types in the address bar and recent search suggestions are shown in the suggestions overlay.
    extra_keys:
      count:
        type: quantity
        description: |
          The number of recent search suggestions displayed.
    data_sensitivity:
      - interaction
    bugs:
      - https://github.com/mozilla-mobile/firefox-ios/issues/29616
    data_reviews:
      - https://github.com/mozilla-mobile/firefox-ios/pull/XXXXX
    notification_emails:
      - fx-ios-data-stewards@mozilla.com
    expires: "2026-01-01"

  suggestion_tapped:
    type: event
    description: |
      Triggered when the user taps a recent search suggestion in the suggestions overlay.
    extra_keys:
      position:
        type: quantity
        description: |
          The position of the clicked recent search suggestion. The first suggestion has index of 1.
    data_sensitivity:
      - interaction
    bugs:
      - https://github.com/mozilla-mobile/firefox-ios/issues/29616
    data_reviews:
      - https://github.com/mozilla-mobile/firefox-ios/pull/XXXXX
    notification_emails:
      - fx-ios-data-stewards@mozilla.com
    expires: "2026-01-01"
