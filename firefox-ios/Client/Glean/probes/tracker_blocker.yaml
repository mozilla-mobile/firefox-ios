$tags:
  - TrackerBlocker

###############################################################################
# Documentation
###############################################################################

# Add your new metrics and/or events here.
# Homepage Tracker Blocker module
tracker_blocker:
  lifetime_threshold_reached:
    type: event
    description: |
      Records when the lifetime blocked-tracker total shown in the homepage
      tracker blocker module first crosses a digit-count boundary (4 through 8
      figures, i.e. 1,000 / 10,000 / 100,000 / 1,000,000 / 10,000,000). Each
      boundary is reported at most once over the app's lifetime.
    extra_keys:
      figures:
        type: quantity
        description: |
          The digit-count boundary that was crossed, from 4 to 8.
    bugs:
      - https://mozilla-hub.atlassian.net/browse/FXIOS-15941
    data_reviews:
      - https://github.com/mozilla-mobile/firefox-ios/pull/34765
    notification_emails:
      - fx-ios-data-stewards@mozilla.com
    expires: never
