    data_reviews:
      - https://github.com/mozilla-mobile/firefox-ios/pull/34309
    notification_emails:
      - fx-ios-data-stewards@mozilla.com
    expires: never
  marfeel:
    type: boolean
    description: |
      Whether the Marfeel framework was detected on the reported page.
    data_sensitivity:
      - technical
    lifetime: ping
    send_in_pings:
      - broken-site-report
    bugs:
      - https://mozilla-hub.atlassian.net/browse/FXIOS-16177
    data_reviews:
      - https://github.com/mozilla-mobile/firefox-ios/pull/34309
    notification_emails:
      - fx-ios-data-stewards@mozilla.com
    expires: never
  mobify:
    type: boolean
    description: |
      Whether the Mobify framework was detected on the reported page.
    data_sensitivity:
