# This file defines the metrics that are recorded by the Glean SDK. They are
# automatically converted to Swift code at build time using the `glean_parser`
# PyPI package.

# This file is organized (roughly) alphabetically by metric names
# for easy navigation

---
$schema: moz://mozilla.org/schemas/glean/metrics/2-0-0

$tags:
  - TopSites

###############################################################################
# Top Sites Telemetry Metrics
###############################################################################

top_sites:
  shortcut_pinned:
    type: event
    description: |
      Records an event when a user pins a shortcut to top sites.
    extra_keys:
      source:
        type: string
        description: |
          Source that initiated the pinned shortcut.
          Options are listed in the HomepageTelemetry.TopSitesShortcutPinnedSource enumeration.
    bugs:
      - https://mozilla-hub.atlassian.net/browse/FXIOS-15861
    data_reviews:
      - https://github.com/mozilla-mobile/firefox-ios/pull/34183
    notification_emails:
      - fx-ios-data-stewards@mozilla.com
    expires: never
  shortcut_unpinned:
    type: event
    description: |
      Records an event when a user unpins a shortcut from top sites.
    extra_keys:
      source:
        type: string
        description: |
          Source that initiated the unpinned shortcut.
          Options are listed in the HomepageTelemetry.TopSitesShortcutUnpinnedSource enumeration.
    bugs:
      - https://mozilla-hub.atlassian.net/browse/FXIOS-15861
    data_reviews:
      - https://github.com/mozilla-mobile/firefox-ios/pull/34183
    notification_emails:
      - fx-ios-data-stewards@mozilla.com
    expires: never
  tile_pressed:
    type: event
    description: |
      Records an event when user taps on top site tile.
    extra_keys:
      tile_type:
        type: string
        description: |
          Type of tile pressed (Ex: google,
          suggested, user-added or history-based)
      position:
        type: string
        description: |
          Position of top site.
    bugs:
      - https://github.com/mozilla-mobile/firefox-ios/issues/8501
    data_reviews:
      - https://github.com/mozilla-mobile/firefox-ios/pull/8662
      - https://github.com/mozilla-mobile/firefox-ios/pull/9673
      - https://github.com/mozilla-mobile/firefox-ios/pull/12334
      - https://github.com/mozilla-mobile/firefox-ios/pull/14102
    notification_emails:
      - fx-ios-data-stewards@mozilla.com
    expires: never
  pressed_tile_origin:
    type: labeled_counter
    description: |
      Records an event when user taps on top site tile,
      with a home page origin.
    labels:
      - zero-search
      - origin-other
    bugs:
      - https://github.com/mozilla-mobile/firefox-ios/issues/9308
    data_reviews:
      - https://github.com/mozilla-mobile/firefox-ios/pull/9494
      - https://github.com/mozilla-mobile/firefox-ios/pull/9673
      - https://github.com/mozilla-mobile/firefox-ios/pull/12334
      - https://github.com/mozilla-mobile/firefox-ios/pull/14102
    notification_emails:
      - fx-ios-data-stewards@mozilla.com
    expires: never
  contextual_menu:
    type: event
    description: |
        Records when a user clicks on a contextual
        menu option on top site
    extra_keys:
      type:
        type: string
        description: |
          Type of contextual action
    bugs:
      - https://github.com/mozilla-mobile/firefox-ios/pull/10514
    data_reviews:
      - https://github.com/mozilla-mobile/firefox-ios/pull/10514
      - https://github.com/mozilla-mobile/firefox-ios/pull/12334
      - https://github.com/mozilla-mobile/firefox-ios/pull/14102
    notification_emails:
      - fx-ios-data-stewards@mozilla.com
    expires: never
  context_id:
    type: uuid
    description: |
      A UUID that is unjoinable with other browser metrics. This ID will not be
      shared with AdM, only for internal uses. This ID is shared across all
      contextual services features.
    lifetime: application
    send_in_pings:
      - topsites-impression
    bugs:
      - https://github.com/mozilla-mobile/firefox-ios/pull/10696
    data_reviews:
      - https://github.com/mozilla-mobile/firefox-ios/pull/10696
      - https://github.com/mozilla-mobile/firefox-ios/pull/12334
      - https://github.com/mozilla-mobile/firefox-ios/pull/14102
    data_sensitivity:
      - highly_sensitive
    notification_emails:
      - fx-ios-data-stewards@mozilla.com
    expires: never
  contile_advertiser:
    type: string
    description: |
      Advertiser brand for the sponsored TopSites tile
    lifetime: ping
    send_in_pings:
      - topsites-impression
    bugs:
      - https://github.com/mozilla-mobile/firefox-ios/pull/10696
    data_reviews:
      - https://github.com/mozilla-mobile/firefox-ios/pull/10696
      - https://github.com/mozilla-mobile/firefox-ios/pull/12334
      - https://github.com/mozilla-mobile/firefox-ios/pull/14102
    data_sensitivity:
      - technical
      - interaction
    notification_emails:
      - fx-ios-data-stewards@mozilla.com
    expires: never
  contile_impression:
    type: event
    description: |
      A user saw a Contile top site
    extra_keys:
      source:
        description: The source of the event, example "newtab", "urlbar"
        type: string
      position:
        description: The tile placement (1-based)
        type: quantity
    send_in_pings:
      - topsites-impression
      - events
    bugs:
      - https://github.com/mozilla-mobile/firefox-ios/pull/10696
    data_reviews:
      - https://github.com/mozilla-mobile/firefox-ios/pull/10696
      - https://github.com/mozilla-mobile/firefox-ios/pull/12334
      - https://github.com/mozilla-mobile/firefox-ios/pull/14102
    data_sensitivity:
      - interaction
    notification_emails:
      - fx-ios-data-stewards@mozilla.com
    expires: never
  contile_click:
    type: event
    description: |
      A user clicked a Contile top site
    extra_keys:
      source:
        description: The source of the event, example "newtab", "urlbar"
        type: string
      position:
        description: The tile placement (1-based)
        type: quantity
    send_in_pings:
      - topsites-impression
      - events
    bugs:
      - https://github.com/mozilla-mobile/firefox-ios/pull/10696
    data_reviews:
      - https://github.com/mozilla-mobile/firefox-ios/pull/10696
      - https://github.com/mozilla-mobile/firefox-ios/pull/12334
      - https://github.com/mozilla-mobile/firefox-ios/pull/14102
    data_sensitivity:
      - interaction
    notification_emails:
      - fx-ios-data-stewards@mozilla.com
    expires: never
  open_in_private_tab:
    type: event
    description: |
      A user opens a new private tab based on a top site item
    bugs:
      - https://github.com/mozilla-mobile/firefox-ios/issues/14903
    data_reviews:
      - https://github.com/mozilla-mobile/firefox-ios/pull/15503
    notification_emails:
      - fx-ios-data-stewards@mozilla.com
    expires: never
  sponsored_shortcuts:
    type: boolean
    description: |
      Tracks if the user has enabled sponsored shortcuts
    bugs:
      - https://bugzilla.mozilla.org/show_bug.cgi?id=1842084
    data_reviews:
      - https://github.com/mozilla-mobile/firefox-ios/pull/15768
    notification_emails:
      - fx-ios-data-stewards@mozilla.com
    expires: never
